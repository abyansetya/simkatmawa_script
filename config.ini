[api]
base_url = https://simkatmawa.kemdiktisaintek.go.id/api
login_endpoint = /login
sertif_endpoint = /sertif

[credentials]
email = xxxxx@xxxx.com
password = xxxxxxx

[settings]
# Delay antar request dalam detik (untuk menghindari rate limiting)
request_delay = 1
# Jumlah retry jika request gagal
max_retries = 3
# Timeout request dalam detik
timeout = 30
